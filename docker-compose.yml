# ============================================================
# PackageGo API – Docker Compose (Full Stack)
# ============================================================
# Start everything:   docker compose up -d
# Stop everything:    docker compose down
# Stop + wipe data:   docker compose down -v
# Rebuild after code: docker compose up -d --build
# ============================================================

services:

  # ── 1. PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: packagego
      POSTGRES_PASSWORD: changeme_postgres
      POSTGRES_DB: packagego
    ports:
      - "5433:5432"    # 5433 on host to avoid conflict with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U packagego"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 2. Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 3. Elasticsearch ─────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── 4. MinIO (S3-compatible storage) ─────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 5. Mailpit (Fake SMTP for dev) ───────────────────────
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  # ── 6. FastAPI Application ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.docker
    environment:
      - PYTHONPATH=/app
    ports:
      - "8080:8000"    # 8080 on host to avoid conflict with local uvicorn
    volumes:
      - .:/app                  # Live reload for development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    restart: unless-stopped

  # ── 7. Celery Worker ─────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env.docker
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # ── 8. Celery Beat (Periodic Task Scheduler) ────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env.docker
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── 9. Flower (Celery Monitoring UI) ────────────────────
  flower:
    image: mher/flower:2.0
    command: celery --broker=redis://redis:6379/1 flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── 10. Redis Commander (Redis Browser UI) ───────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    platform: linux/amd64
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped


# ── Named Volumes (persistent across restarts) ─────────────
volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:
